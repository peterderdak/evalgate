name: EvalGate
description: Trigger EvalGate CI runs and fail pull requests on regressions.
inputs:
  evalgate_url:
    required: true
  project_id:
    required: true
  dataset_id:
    required: true
  run_config_id:
    required: true
  evalgate_token:
    required: true
runs:
  using: node20
  main: dist/index.js
