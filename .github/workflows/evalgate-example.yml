name: EvalGate Example

on:
  workflow_dispatch:
  pull_request:

jobs:
  evalgate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run EvalGate
        uses: your-org/evalgate-action@v1
        with:
          evalgate_url: ${{ secrets.EVALGATE_URL }}
          project_id: proj_123
          dataset_id: ds_123
          run_config_id: cfg_123
          evalgate_token: ${{ secrets.EVALGATE_TOKEN }}
